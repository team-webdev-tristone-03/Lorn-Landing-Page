<!DOCTYPE html>
<html>
<head>
    <title>Delete Firebase Data</title>
</head>
<body>
    <h1>Delete All Firebase Data</h1>
    <button onclick="deleteAllData()" style="padding: 20px; background: red; color: white; font-size: 18px; cursor: pointer;">DELETE ALL DATA</button>
    <div id="status"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="./firebaseConfig.js"></script>
    <script>
        async function deleteAllData() {
            if (!confirm('Are you sure? This will delete ALL data!')) return;
            
            const db = firebase.firestore();
            const collections = ['upi_payments', 'payments', 'carts', 'cart_purchases', 'email_signups'];
            const status = document.getElementById('status');
            
            for (const collectionName of collections) {
                status.innerHTML += `<p>Deleting ${collectionName}...</p>`;
                const snapshot = await db.collection(collectionName).get();
                
                for (const doc of snapshot.docs) {
                    await doc.ref.delete();
                }
                
                status.innerHTML += `<p style="color: green;">✓ Deleted ${snapshot.size} documents from ${collectionName}</p>`;
            }
            
            status.innerHTML += '<h2 style="color: green;">ALL DATA DELETED!</h2>';
        }
    </script>
</body>
</html>
