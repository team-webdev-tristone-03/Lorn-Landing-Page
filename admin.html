<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - LORN VINGEST</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(
          135deg,
          #000000 0%,
          #1a0033 50%,
          #000000 100%
        );
        color: #fff;
        min-height: 100vh;
      }

      .header {
        background: rgba(0, 0, 0, 0.8);
        padding: 1rem 2rem;
        border-bottom: 2px solid #ff00ff;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .logo h1 {
        background: linear-gradient(45deg, #ff00ff, #00ffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 1.8rem;
        font-weight: 900;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        padding: 2rem;
      }

      .stat-card {
        background: rgba(17, 17, 17, 0.9);
        padding: 1.5rem;
        border-radius: 15px;
        border: 1px solid #333;
        text-align: center;
      }

      .stat-number {
        font-size: 2rem;
        font-weight: bold;
        color: #00ffff;
        margin-bottom: 0.5rem;
      }

      .stat-label {
        color: #aaa;
        font-size: 0.9rem;
      }

      .dashboard-container {
        padding: 2rem;
      }

      .section-title {
        font-size: 1.5rem;
        color: #ff00ff;
        margin-bottom: 1.5rem;
        text-align: center;
      }

      .payments-table {
        background: rgba(17, 17, 17, 0.9);
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid #333;
      }

      .table-header {
        background: #ff00ff;
        padding: 1rem;
        display: grid;
        grid-template-columns: 1.5fr 2fr 1.5fr 2fr 1fr 1.5fr;
        gap: 1rem;
        font-weight: bold;
        font-size: 0.9rem;
      }

      .payment-row {
        padding: 1rem;
        display: grid;
        grid-template-columns: 1.5fr 2fr 1.5fr 2fr 1fr 1.5fr;
        gap: 1rem;
        border-bottom: 1px solid #333;
        align-items: center;
        font-size: 0.85rem;
      }

      .payment-row:hover {
        background: rgba(255, 0, 255, 0.1);
      }

      .view-btn {
        background: linear-gradient(45deg, #00ffff, #0088ff);
        color: white;
        border: none;
        padding: 0.4rem 0.8rem;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.7rem;
      }

      .view-btn:hover {
        transform: scale(1.05);
      }

      .loading {
        text-align: center;
        padding: 2rem;
        color: #00ffff;
      }

      @media (max-width: 768px) {
        .table-header,
        .payment-row {
          grid-template-columns: 1fr;
          gap: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <i
          class="fas fa-chart-line"
          style="color: #ff00ff; font-size: 1.5rem"
        ></i>
        <h1>LORN VINGEST Admin</h1>
      </div>
      <button onclick="logout()" class="view-btn" style="background: #dc3545">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalPayments">0</div>
        <div class="stat-label">Total Payments</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalRevenue">₹0</div>
        <div class="stat-label">Total Revenue</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalCustomers">0</div>
        <div class="stat-label">Unique Customers</div>
      </div>
    </div>

    <div class="dashboard-container">
      <h2 class="section-title">UPI Payment Records</h2>

      <div class="payments-table">
        <div class="table-header">
          <div>Customer Name</div>
          <div>Customer Email</div>
          <div>Customer Phone</div>
          <div>Products Name</div>
          <div>Product Price</div>
          <div>UPI Transaction ID</div>
        </div>
        <div id="paymentsContainer">
          <div class="loading">
            <i class="fas fa-spinner fa-spin"></i> Loading payments...
          </div>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="./firebaseConfig.js"></script>

    <script>
      if (!sessionStorage.getItem("adminLoggedIn")) {
        window.location.href = "admin-login.html";
      }

      let allPayments = [];
      const db = firebase.firestore();

      db.collection('upi_payments').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
        allPayments = [];
        snapshot.forEach(doc => {
          allPayments.push({ id: doc.id, ...doc.data() });
        });
        updateStats();
        displayPayments();
      });

      function updateStats() {
        const totalPayments = allPayments.length;
        const totalRevenue = allPayments.reduce((sum, p) => sum + (p.productPrice || 0), 0);
        const uniqueCustomers = new Set(allPayments.map(p => p.customerEmail)).size;

        document.getElementById('totalPayments').textContent = totalPayments;
        document.getElementById('totalRevenue').textContent = '₹' + totalRevenue;
        document.getElementById('totalCustomers').textContent = uniqueCustomers;
      }

      function displayPayments() {
        const container = document.getElementById('paymentsContainer');

        if (allPayments.length === 0) {
          container.innerHTML = '<div class="loading">No payments found</div>';
          return;
        }

        container.innerHTML = allPayments.map(p => `
          <div class="payment-row">
            <div>${p.customerName || 'N/A'}</div>
            <div>${p.customerEmail || 'N/A'}</div>
            <div>${p.customerPhone || 'N/A'}</div>
            <div>${p.productsName || 'N/A'}</div>
            <div>₹${p.productPrice || 0}</div>
            <div>${p.upiTransactionId || 'N/A'}</div>
          </div>
        `).join('');
      }

      function logout() {
        sessionStorage.removeItem("adminLoggedIn");
        window.location.href = "admin-login.html";
      }
    </script>
  </body>
</html>
